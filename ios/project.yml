name: WorkoutSystem
options:
  bundleIdPrefix: com.workoutsystem
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  # ─────────────────────────────────────────────────────────────────────────────
  # iPhone App — WorkoutSync
  # ─────────────────────────────────────────────────────────────────────────────
  WorkoutSync:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WorkoutSync/Sources
        type: group
    info:
      path: WorkoutSync/Info.plist
    entitlements:
      path: WorkoutSync/WorkoutSync.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.workoutsystem.iphone
        INFOPLIST_FILE: WorkoutSync/Info.plist
        CODE_SIGN_ENTITLEMENTS: WorkoutSync/WorkoutSync.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: WatchWorkout
        embed: true
        codeSign: true
        buildPhase:
          copyFiles:
            destination: productsDirectory
            subpath: "$(CONTENTS_FOLDER_PATH)/Watch"
    scheme:
      testTargets: []
      gatherCoverageData: false
      targets:
        WorkoutSync: {}

  # ─────────────────────────────────────────────────────────────────────────────
  # Watch App — WatchWorkout
  # ─────────────────────────────────────────────────────────────────────────────
  WatchWorkout:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchWorkout/Sources
        type: group
    info:
      path: WatchWorkout/Info.plist
      # WKApplication only — do not set WKWatchKitApp too (simulator install rejects both).
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.workoutsystem.iphone
    entitlements:
      path: WatchWorkout/WatchWorkout.entitlements
    settings:
      base:
        # Must be prefixed by parent iOS app ID + "." (embedded Watch app rule)
        PRODUCT_BUNDLE_IDENTIFIER: com.workoutsystem.iphone.watch
        INFOPLIST_FILE: WatchWorkout/Info.plist
        CODE_SIGN_ENTITLEMENTS: WatchWorkout/WatchWorkout.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SDKROOT: watchos
        TARGETED_DEVICE_FAMILY: 4
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
    scheme:
      testTargets: []
      gatherCoverageData: false
      targets:
        WatchWorkout: {}
